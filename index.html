<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Center | Login</title>
  
  <link rel="stylesheet" href="css/style.css">
  <script src="js/login.js" defer></script>
</head>
<body>
  <header class="header-login">
    <div class="logo">⚽ Sport Center</div>
  </header>

  <main class="main-login">
    <section class="container-login">
      <h1>Convoque-se para o Jogo</h1>
      <p>Acesse sua conta para ver as melhores ofertas.</p>
      
      <form id="form-login">
        <div class="grupo-input">
          <label for="input-email">E-mail do Torcedor:</label>
          <input type="email" id="input-email" placeholder="camisa10@futebol.com" required>
        </div>
        
        <div class="grupo-input">
          <label for="input-senha">Senha:</label>
          <input type="password" id="input-senha" placeholder="••••••••" required>
        </div>
        
        <div id="msg-erro-login" class="mensagem-erro oculto"></div>
        
        <button type="submit" id="btn-login" class="btn-primario">Entrar em Campo</button>
      </form>

      <div class="acesso-admin" style="margin-top: 1.5rem; text-align: center;">
        <a href="#" id="link-admin" style="color: var(--cor-texto-mutado); text-decoration: none; font-size: 0.9rem; transition: color 0.3s;">
          🔒 Acesso da Diretoria (Admin)
        </a>
      </div>
    </section>
  </main>
</body>
</html>
